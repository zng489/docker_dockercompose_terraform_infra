services:
  spark-master:
    image: spark-custom:latest
    container_name: spark-master
    command: ["tini", "--", "spark-class", "org.apache.spark.deploy.master.Master"]
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./spark-shared:/tmp/spark-shared
    networks:
      - spark-net

  spark-worker-1:
    image: spark-custom:latest
    container_name: spark-worker-1
    command: ["tini", "--", "spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=2g
    ports:
      - "8081:8081"
    depends_on:
      - spark-master
    volumes:
      - ./spark-shared:/tmp/spark-shared
    networks:
      - spark-net

  spark-worker-2:
    image: spark-custom:latest
    container_name: spark-worker-2
    command: ["tini", "--", "spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=2g
    ports:
      - "8082:8081"
    depends_on:
      - spark-master
    volumes:
      - ./spark-shared:/tmp/spark-shared
    networks:
      - spark-net

  jupyter:
    image: jupyter:latest
    container_name: jupyter
    command: ["tini", "--", "jupyter", "lab", "--ip=0.0.0.0", "--port=8888", "--no-browser", "--allow-root", "--NotebookApp.token=spark123"]
    environment:
      - PYSPARK_SUBMIT_ARGS=--master spark://spark-master:7077 --packages io.delta:delta-spark_2.12:3.1.0 pyspark-shell
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data
      - ./delta-lake:/home/jovyan/delta-lake
      - ./spark-shared:/tmp/spark-shared
    depends_on:
      - spark-master
    networks:
      - spark-net

  alarik:
    image: ghcr.io/achtungsoftware/alarik:latest
    container_name: alarik
    restart: unless-stopped
    ports:
      - "8085:8080"
    environment:
      - API_BASE_URL=http://localhost:8085
      - CONSOLE_BASE_URL=http://localhost:3005
      - ADMIN_USERNAME=alarik
      - ADMIN_PASSWORD=alarik
      - JWT=YOUR_SECURE_JWT_KEY
      - ALLOW_ACCOUNT_CREATION=false
    volumes:
      - alarik-storage:/app/Storage
    networks:
      - spark-net

  console:
    image: ghcr.io/achtungsoftware/alarik-console:latest
    container_name: console
    restart: unless-stopped
    ports:
      - "3005:3000"
    environment:
      - NUXT_PUBLIC_API_BASE_URL=http://localhost:8085
      - NUXT_PUBLIC_CONSOLE_BASE_URL=http://localhost:3005
      - NUXT_PUBLIC_ALLOW_ACCOUNT_CREATION=false
    depends_on:
      - alarik
    networks:
      - spark-net

  hdfs-namenode:
    image: hadoop:latest
    container_name: hdfs-namenode
    entrypoint: >
      tini -- bash -c "
        if [ ! -d /tmp/hadoop-root/dfs/name/current ]; then
          hdfs namenode -format -force;
        fi;
        hdfs namenode
      "
    ports:
      - "9870:9870"
      - "8020:8020"
    volumes:
      - hdfs-namenode-data:/tmp/hadoop-root/dfs/name
    networks:
      - spark-net

  hdfs-datanode:
    image: hadoop:latest
    container_name: hdfs-datanode
    restart: always
    command: ["hdfs", "datanode"]
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://hdfs-namenode:8020
    ports:
      - "9864:9864"
      - "9866:9866"
    volumes:
      - hdfs-datanode-data:/tmp/hadoop-root/dfs/data
    depends_on:
      - hdfs-namenode
    networks:
      - spark-net

networks:
  spark-net:
    driver: bridge

volumes:
  hdfs-namenode-data:
  hdfs-datanode-data:
  alarik-storage: