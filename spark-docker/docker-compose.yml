services:
  # ═══════════════════════════════════════════════════════
  #  HDFS
  # ═══════════════════════════════════════════════════════
  hdfs-namenode:
    image: hadoop:latest
    container_name: hdfs-namenode
    command:
      - "tini"
      - "--"
      - "bash"
      - "-c"
      - "hdfs namenode -format -force && hdfs namenode"
    ports:
      - "9870:9870"
    volumes:
      - namenode-data:/opt/hadoop/data/namenode
    networks:
      - spark-net

  hdfs-datanode:
    image: hadoop:latest
    container_name: hdfs-datanode
    command: ["tini", "--", "hdfs", "datanode"]
    depends_on:
      - hdfs-namenode
    volumes:
      - datanode-data:/opt/hadoop/data/datanode
    networks:
      - spark-net

  # ═══════════════════════════════════════════════════════
  #  SPARK
  # ═══════════════════════════════════════════════════════
  spark-master:
    image: spark-custom:latest
    container_name: spark-master
    user: "0:0"
    command: ["tini", "--", "spark-class", "org.apache.spark.deploy.master.Master"]
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - spark-shared:/tmp/spark-shared
      - shared-data:/home/jovyan/data
      - ./local-data:/home/jovyan/local-data
    networks:
      - spark-net

  spark-worker-1:
    image: spark-custom:latest
    container_name: spark-worker-1
    user: "0:0"
    command: ["tini", "--", "spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=2g
    ports:
      - "8081:8081"
    depends_on:
      - spark-master
    volumes:
      - spark-shared:/tmp/spark-shared
      - shared-data:/home/jovyan/data
      - ./local-data:/home/jovyan/local-data
    networks:
      - spark-net

  spark-worker-2:
    image: spark-custom:latest
    container_name: spark-worker-2
    user: "0:0"
    command: ["tini", "--", "spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=2g
    ports:
      - "8082:8081"
    depends_on:
      - spark-master
    volumes:
      - spark-shared:/tmp/spark-shared
      - shared-data:/home/jovyan/data
      - ./local-data:/home/jovyan/local-data
    networks:
      - spark-net

  # ═══════════════════════════════════════════════════════
  #  JUPYTER
  # ═══════════════════════════════════════════════════════
  jupyter:
    image: jupyter:latest
    container_name: jupyter
    user: "0:0"
    command:
      - "tini"
      - "--"
      - "jupyter"
      - "lab"
      - "--ip=0.0.0.0"
      - "--port=8888"
      - "--no-browser"
      - "--allow-root"
      - "--NotebookApp.token=spark123"
    environment:
      - PYSPARK_SUBMIT_ARGS=--master spark://spark-master:7077 --packages io.delta:delta-spark_2.12:3.1.0 pyspark-shell
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
      - shared-data:/home/jovyan/data
      - ./delta-lake:/home/jovyan/delta-lake
      - spark-shared:/tmp/spark-shared
      - ./local-data:/home/jovyan/local-data
    depends_on:
      - spark-master
      - hdfs-namenode
    networks:
      - spark-net

  # ═══════════════════════════════════════════════════════
  #  RUSTFS
  # ═══════════════════════════════════════════════════════
  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - RUSTFS_ACCESS_KEY=rustfs
      - RUSTFS_SECRET_KEY=rustfs123
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_VOLUMES=/data
    volumes:
      - rustfs-data:/data
    networks:
      - spark-net

networks:
  spark-net:
    driver: bridge

volumes:
  rustfs-data:
  spark-shared:
  shared-data:
  namenode-data:
  datanode-data:
